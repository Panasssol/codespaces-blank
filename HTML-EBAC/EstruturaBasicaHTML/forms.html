<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Formulário de pesquisa</h1>
    <form>
        <label for="nome">Informe seu nome</label>
        <input type="text" placeholder="Seu nome" id="nome" />
        <br />
        <label for="email">Informe seu email</label>
        <input type="email" placeholder="Seu email" id="email" />
        <br />
        <label for="senha">Informe uma senha</label>
        <input type="password" placeholder="Insira uma senha" id="senha" />
        <br />
        <label for="telefone">Informe seu número de telefone</label>
        <input type="tel" placeholder="Seu telefone" id="telefone" />
        <br />
        <label for="idade">Informe sua idade</label>
        <input type="email" placeholder="Sua idade" id="idade" />
        <br />
        <label for="foto">Insira uma foto sua</label> <br />
        <input type="file" id="foto" />
        <br />
        <label for="cor">Qual cor gostaria para o fundo?</label>
        <input type="color" id="email" />
        <br />
        <label for="termos">Termos e condições</label> <br />
        <input type="checkbox" id="termos" /> <label for="termos">Aceito os termos e condições</label>
        <br />
        <p>Qual seu turno preferido</p>
        <input type="radio" name="turno" id="turno-manhã" /> <label for="turno-">Manhã</label>
        <input type="radio" name="turno" id="turno-tarde" /> <label for="turno-">Tarde</label>
        <input type="radio" name="turno" id="turno-noite" /> <label for="turno-">Noite</label>
        <br />
        <label>Escolha 1 item</label>
        <select>
            <option>Item 1</option>
            <option>Item 2</option>
            <option>Item 3</option>
        </select>
        <br />
        <label>De sua opinião sobre esse forms</label> <br />
        <textarea></textarea>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>
</body>
</html>
