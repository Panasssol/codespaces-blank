<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <table>
        <caption>Notas em beleza</caption>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Nota</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Matheus</td>
                <td>10</td>
                <td>Ana</td>
                <td>8</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Média das notas</td>
                <td>9</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
